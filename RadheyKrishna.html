<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Radhey Krishna Decoratives</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Marcellus&family=Mukta:wght@300;400;500;600&display=swap" rel="stylesheet">
	<style>
	:root {
		/* Radha Krishna palette: peacock teal, dusk indigo, marigold, lotus rose, ivory */
		--peacock:   #0e6e6e;
		--peacock-d: #084a4a;
		--indigo:    #2b2150;
		--indigo-d:  #1a1335;
		--marigold:  #e9a227;
		--marigold-l:#f6c95a;
		--rose:      #c25a72;
		--rose-l:    #e8b8c4;
		--ivory:     #faf6ee;
		--ivory-d:   #f0e8d8;
		--ink:       #211a3a;
		--ink-soft:  #5a5273;
		--gold-line: #d9b366;
		--shadow:    rgba(26, 19, 53, 0.14);
	}

	* { box-sizing: border-box; margin: 0; padding: 0; }

	html { scroll-behavior: smooth; }

	body {
		background:
			radial-gradient(circle at 12% 8%, rgba(233,162,39,0.10), transparent 38%),
			radial-gradient(circle at 88% 4%, rgba(14,110,110,0.10), transparent 40%),
			var(--ivory);
		color: var(--ink);
		font-family: 'Mukta', sans-serif;
		font-weight: 300;
		line-height: 1.6;
		min-height: 100vh;
		padding: 0 20px 80px;
	}

	.main { max-width: 1180px; margin: auto; }

	/* ---------- HERO ---------- */
	.hero {
		text-align: center;
		padding: 64px 16px 40px;
		position: relative;
	}
	.peacock-feather {
		display: block;
		margin: 0 auto 18px;
		width: 46px; height: 46px;
	}
	.eyebrow {
		font-family: 'Mukta', sans-serif;
		letter-spacing: 0.42em;
		text-transform: uppercase;
		font-size: 12px;
		font-weight: 500;
		color: var(--peacock);
		margin-bottom: 14px;
	}
	.hero h1 {
		font-family: 'Cormorant Garamond', serif;
		font-weight: 600;
		font-size: clamp(46px, 8vw, 86px);
		line-height: 0.98;
		color: var(--indigo);
		letter-spacing: 0.5px;
	}
	.hero h1 .amp {
		font-style: italic;
		font-weight: 400;
		color: var(--marigold);
		padding: 0 4px;
	}
	.hero .subtitle {
		font-family: 'Marcellus', serif;
		font-size: clamp(15px, 2.4vw, 19px);
		letter-spacing: 0.32em;
		text-transform: uppercase;
		color: var(--rose);
		margin-top: 16px;
	}
	.divider {
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 14px;
		margin: 30px auto 0;
		max-width: 320px;
	}
	.divider span {
		height: 1px; flex: 1;
		background: linear-gradient(to right, transparent, var(--gold-line), transparent);
	}
	.divider svg { width: 22px; height: 22px; color: var(--marigold); }

	/* ---------- FILTER BAR (Radha–Krishna themed) ---------- */
	.filter-wrap {
		position: sticky;
		top: 0;
		z-index: 40;
		padding: 16px 0 20px;
		margin-bottom: 8px;
		/* background: linear-gradient(to bottom, var(--ivory) 10%, transparent); */
		border-top-left-radius: 18px;
    	border-top-right-radius: 18px;
	}
	#myBtnContainer {
		display: flex;
		flex-wrap: wrap;
		justify-content: center;
		align-items: center;
		gap: 12px;
		position: relative;
		max-width: max-content;
		margin: 0 auto;
		padding: 14px 26px;
		border-radius: 999px;
		/* soft ivory glass panel with a peacock/marigold wash */
		background:
			radial-gradient(circle at 0% 50%, rgba(233,162,39,0.12), transparent 60%),
			radial-gradient(circle at 100% 50%, rgba(14,110,110,0.12), transparent 60%),
			rgba(255,255,255,0.72);
		border: 1px solid rgba(217,179,102,0.55);
		box-shadow:
			0 10px 30px -16px rgba(26,19,53,0.30),
			inset 0 0 0 1px rgba(255,255,255,0.5);
		backdrop-filter: blur(8px);
	}
	/* little peacock-feather flourishes at each end of the bar */
	#myBtnContainer::before,
	#myBtnContainer::after {
		content: "";
		width: 13px; height: 13px;
		border-radius: 50%;
		flex: none;
		background:
			radial-gradient(circle at 50% 50%, var(--marigold) 0 28%, var(--indigo) 30% 56%, var(--peacock) 58% 100%);
		box-shadow: 0 0 0 2px rgba(255,255,255,0.7), 0 2px 6px rgba(14,110,110,0.4);
		opacity: 0.9;
	}

	.btn {
		font-family: 'Marcellus', serif;
		font-size: 15px;
		letter-spacing: 0.08em;
		border: 1px solid rgba(43,33,80,0.16);
		background: rgba(255,255,255,0.6);
		color: var(--indigo);
		padding: 9px 22px;
		border-radius: 999px;
		cursor: pointer;
		position: relative;
		transition: color .28s ease, border-color .28s ease, transform .28s ease, box-shadow .28s ease, background .28s ease;
	}
	.btn:hover {
		border-color: var(--peacock);
		color: var(--peacock);
		transform: translateY(-2px);
		box-shadow: 0 6px 16px -8px rgba(14,110,110,0.6);
	}
	/* active pill: peacock→indigo gradient with a marigold gold ring + glow */
	.btn.active {
		color: var(--ivory);
		border-color: transparent;
		background: linear-gradient(135deg, var(--peacock) 0%, var(--indigo) 100%);
		box-shadow:
			0 0 0 2px var(--marigold-l),
			0 8px 22px -6px rgba(14,110,110,0.65);
		transform: translateY(-1px);
	}
	/* a small marigold "feather-eye" dot on the active pill */
	.btn.active::after {
		content: "";
		position: absolute;
		top: 50%; right: 12px;
		width: 6px; height: 6px;
		transform: translateY(-50%);
		border-radius: 50%;
		background: var(--marigold-l);
		box-shadow: 0 0 6px var(--marigold);
	}
	.btn.active { padding-right: 30px; }

	/* ---------- SEARCH inside the filter bar ---------- */
	.filter-btns {
		display: flex;
		flex-wrap: wrap;
		justify-content: center;
		align-items: center;
		gap: 12px;
		transition: opacity 0.25s ease, transform 0.25s ease;
	}
	/* round magnifier toggle, sits at the right end of the buttons */
	.search-toggle {
		flex: none;
		width: 40px; height: 40px;
		border-radius: 50%;
		border: 1px solid rgba(217,179,102,0.7);
		background: rgba(255,255,255,0.75);
		color: var(--peacock-d);
		cursor: pointer;
		display: flex; align-items: center; justify-content: center;
		transition: color .25s ease, border-color .25s ease, transform .25s ease, box-shadow .25s ease, opacity .25s ease;
	}
	.search-toggle:hover {
		color: var(--peacock);
		border-color: var(--peacock);
		transform: translateY(-2px);
		box-shadow: 0 6px 16px -8px rgba(14,110,110,0.6);
	}
	.search-toggle svg { width: 18px; height: 18px; }

	/* the search overlay — sits on top of the buttons, no reflow */
	.search-box {
		position: absolute;
		left: 14px; right: 14px;
		top: 50%;
		display: flex;
		align-items: center;
		gap: 6px;
		border-radius: 999px;
		background: rgba(255,255,255,0.92);
		border: 1px solid rgba(217,179,102,0.7);
		padding: 6px 8px 6px 14px;
		/* hidden + slightly scaled until searching */
		opacity: 0;
		visibility: hidden;
		transform: translateY(-50%) scale(0.97);
		transition: opacity .3s ease, transform .34s ease, visibility .34s ease;
		pointer-events: none;
	}
	.search-box .search-icon {
		flex: none; display: flex; color: var(--peacock);
	}
	.search-box .search-icon svg { width: 18px; height: 18px; }
	.search-box input {
		flex: 1 1 auto;
		min-width: 0;
		border: none;
		outline: none;
		background: transparent;
		font-family: 'Mukta', sans-serif;
		font-size: 15px;
		color: var(--ink);
		padding: 6px 2px;
	}
	.search-box input::placeholder { color: var(--ink-soft); opacity: 0.8; }
	.search-clear {
		flex: none;
		width: 26px; height: 26px;
		border-radius: 50%;
		border: none;
		background: rgba(43,33,80,0.08);
		color: var(--indigo);
		cursor: pointer;
		display: flex; align-items: center; justify-content: center;
		transition: background .2s ease, color .2s ease;
	}
	.search-clear:hover { background: var(--rose); color: #fff; }
	.search-clear svg { width: 14px; height: 14px; }

	/* the Search button — sits inline inside the overlay, before the X */
	.search-go {
		flex: none;
		font-family: 'Marcellus', serif;
		font-size: 14px;
		letter-spacing: 0.06em;
		color: var(--ivory);
		border: none;
		border-radius: 999px;
		cursor: pointer;
		background: linear-gradient(135deg, var(--peacock) 0%, var(--indigo) 100%);
		box-shadow: 0 4px 14px -6px rgba(14,110,110,0.6);
		white-space: nowrap;
		padding: 8px 18px;
		margin: 0 4px;
		transition: box-shadow .2s ease, transform .2s ease;
	}
	.search-go:hover {
		transform: translateY(-1px);
		box-shadow: 0 0 0 2px var(--marigold-l), 0 6px 18px -6px rgba(14,110,110,0.7);
	}

	/* ---- toggled state: fade buttons out, fade overlay in (no reflow) ---- */
	#myBtnContainer.searching {
		width: min(620px, 92vw);
		max-width: 92vw;
		transition: width .42s ease, max-width .42s ease;
	}
	#myBtnContainer {
		transition: width .42s ease, max-width .42s ease;
	}
	#myBtnContainer.searching .filter-btns {
		opacity: 0;
		pointer-events: none;
		/* collapse so the (still-present) buttons can't add height or wrap */
		height: 0;
		overflow: hidden;
		margin: 0;
	}
	#myBtnContainer.searching .search-toggle {
		opacity: 0;
		pointer-events: none;
	}
	#myBtnContainer.searching .search-box {
		opacity: 1;
		visibility: visible;
		transform: translateY(-50%) scale(1);
		pointer-events: auto;
	}
	#myBtnContainer.searching::before,
	#myBtnContainer.searching::after { opacity: 0; }

	@media (max-width: 560px) {
		#myBtnContainer { padding: 12px 16px; gap: 9px; }
		#myBtnContainer::before, #myBtnContainer::after { display: none; }
		.btn { font-size: 14px; padding: 8px 16px; }
		.btn.active { padding-right: 24px; }
		.btn.active::after { right: 9px; }
		.search-go { font-size: 14px; }
		#myBtnContainer.searching .search-go { padding: 9px 16px; }
	}

	/* ---------- GRID ---------- */
	.row {
		display: grid;
		grid-template-columns: repeat(3, 1fr);
		gap: 26px;
	}
	@media (max-width: 860px) { .row { grid-template-columns: repeat(2, 1fr); } }
	@media (max-width: 560px) { .row { grid-template-columns: 1fr; } }

	.column { display: none; }
	.column.show {
		display: block;
		animation: rise 0.5s ease both;
	}
	@keyframes rise {
		from { opacity: 0; transform: translateY(18px); }
		to   { opacity: 1; transform: translateY(0); }
	}

	/* ---------- CARD (fixed height) ---------- */
	.content {
		background: #fff;
		border-radius: 18px;
		overflow: hidden;
		height: 420px;                /* fixed card height */
		display: flex;
		flex-direction: column;
		border: 1px solid rgba(217,179,102,0.35);
		box-shadow: 0 10px 30px -16px var(--shadow);
		transition: transform 0.3s ease, box-shadow 0.3s ease;
	}
	.content:hover {
		transform: translateY(-6px);
		box-shadow: 0 22px 44px -18px rgba(26,19,53,0.32);
	}

	.thumb {
		position: relative;
		height: 270px;                /* fixed image area */
		flex: none;
		overflow: hidden;
		cursor: zoom-in;
		background: linear-gradient(135deg, var(--ivory-d), #e6dcc4);
	}
	.thumb img {
		width: 100%; height: 100%;
		object-fit: cover;
		display: block;
		transition: transform 0.6s ease;
	}
	.content:hover .thumb img { transform: scale(1.06); }

	/* graceful fallback when an image is missing */
	.thumb::after {
		content: "✦";
		position: absolute; inset: 0;
		display: flex; align-items: center; justify-content: center;
		font-size: 40px; color: var(--gold-line);
		opacity: 0; z-index: 0; transition: opacity 0.3s ease;
	}
	.thumb img[data-broken="1"] { opacity: 0; }
	.thumb img[data-broken="1"] + .zoom-badge { display: none; }
	/* show the decorative placeholder + a label when an image is missing */
	.thumb.no-image { cursor: default; }
	.thumb.no-image::after { opacity: 1; }
	.thumb.no-image .img-soon {
		position: absolute; left: 0; right: 0; bottom: 14px;
		text-align: center; font-family: 'Marcellus', serif;
		font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
		color: var(--ink-soft); z-index: 1;
	}

	.zoom-badge {
		position: absolute;
		top: 12px; right: 12px;
		width: 34px; height: 34px;
		border-radius: 50%;
		background: rgba(43,33,80,0.55);
		color: #fff;
		display: flex; align-items: center; justify-content: center;
		opacity: 0;
		transition: opacity 0.3s ease;
		z-index: 2;
	}
	.thumb:hover .zoom-badge { opacity: 1; }
	.zoom-badge svg { width: 16px; height: 16px; }

	.card-body {
		padding: 16px 18px 18px;
		display: flex;
		flex-direction: column;
		flex: 1;
		min-height: 0;
	}
	.card-body h4 {
		font-family: 'Cormorant Garamond', serif;
		font-weight: 600;
		font-size: 21px;
		line-height: 1.18;
		color: var(--indigo);
		display: -webkit-box;
		-webkit-line-clamp: 2;
		-webkit-box-orient: vertical;
		overflow: hidden;
	}
	.card-body .price {
		margin-top: auto;
		display: inline-flex;
		align-items: baseline;
		gap: 4px;
		font-family: 'Marcellus', serif;
		color: var(--peacock-d);
		font-size: 17px;
	}
	.card-body .price .rs {
		font-size: 12px;
		letter-spacing: 0.12em;
		text-transform: uppercase;
		color: var(--rose);
	}
	.tag {
		align-self: flex-start;
		font-family: 'Mukta', sans-serif;
		font-size: 11px;
		font-weight: 500;
		letter-spacing: 0.14em;
		text-transform: uppercase;
		color: var(--marigold);
		margin-bottom: 8px;
	}

	/* ---------- LIGHTBOX ---------- */
	.lightbox {
		position: fixed;
		inset: 0;
		z-index: 100;
		background: rgba(20,14,42,0.86);
		backdrop-filter: blur(8px);
		display: flex;
		align-items: center;
		justify-content: center;
		flex-direction: column;
		padding: 30px;
		opacity: 0;
		pointer-events: none;
		transition: opacity 0.3s ease;
	}
	.lightbox.open { opacity: 1; pointer-events: auto; }
	.lightbox img {
		max-width: min(90vw, 900px);
		max-height: 76vh;
		border-radius: 12px;
		box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
		transform: scale(0.94);
		transition: transform 0.35s ease;
	}
	.lightbox.open img { transform: scale(1); }
	.lb-caption {
		color: var(--ivory);
		font-family: 'Cormorant Garamond', serif;
		font-size: 24px;
		margin-top: 18px;
		text-align: center;
	}
	.lb-caption span {
		display: block;
		font-family: 'Marcellus', serif;
		font-size: 15px;
		color: var(--marigold-l);
		letter-spacing: 0.1em;
		margin-top: 4px;
	}
	.lb-close, .lb-nav {
		position: absolute;
		background: rgba(255,255,255,0.1);
		border: 1px solid rgba(255,255,255,0.25);
		color: #fff;
		cursor: pointer;
		border-radius: 50%;
		display: flex; align-items: center; justify-content: center;
		transition: background 0.25s ease, transform 0.25s ease;
	}
	.lb-close { top: 22px; right: 24px; width: 46px; height: 46px; }
	.lb-nav   { top: 50%; transform: translateY(-50%); width: 52px; height: 52px; }
	.lb-prev  { left: 24px; }
	.lb-next  { right: 24px; }
	.lb-close:hover, .lb-nav:hover { background: rgba(233,162,39,0.4); }
	.lb-close svg, .lb-nav svg { width: 22px; height: 22px; }
	@media (max-width: 560px) {
		.lb-nav { width: 42px; height: 42px; }
		.lb-prev { left: 10px; } .lb-next { right: 10px; }
	}

	/* ---------- WHATSAPP FLOATING BUTTON ---------- */
	.wa-float {
		position: fixed;
		right: 24px;
		bottom: 24px;
		z-index: 60;
		display: flex;
		align-items: center;
		gap: 10px;
		padding: 12px 18px 12px 14px;
		background: linear-gradient(135deg, #25d366, #128c7e);
		color: #fff;
		border-radius: 999px;
		text-decoration: none;
		font-family: 'Marcellus', serif;
		font-size: 15px;
		letter-spacing: 0.04em;
		box-shadow: 0 12px 30px -10px rgba(18,140,126,0.7);
		transition: transform 0.28s ease, box-shadow 0.28s ease;
	}
	.wa-float:hover {
		transform: translateY(-3px);
		box-shadow: 0 18px 38px -10px rgba(18,140,126,0.8);
	}
	.wa-float svg { width: 26px; height: 26px; flex: none; }
	.wa-float .wa-label { white-space: nowrap; }
	/* pulse ring */
	.wa-float::before {
		content: "";
		position: absolute;
		left: 14px; top: 50%;
		width: 40px; height: 40px;
		transform: translateY(-50%);
		border-radius: 50%;
		background: #25d366;
		z-index: -1;
		animation: wa-pulse 2.4s ease-out infinite;
	}
	@keyframes wa-pulse {
		0%   { transform: translateY(-50%) scale(0.7); opacity: 0.6; }
		100% { transform: translateY(-50%) scale(1.7); opacity: 0; }
	}
	@media (max-width: 560px) {
		.wa-float { padding: 14px; right: 16px; bottom: 16px; }
		.wa-float .wa-label { display: none; }   /* icon only on small screens */
		.wa-float::before { left: 50%; transform: translate(-50%, -50%); }
		@keyframes wa-pulse {
			0%   { transform: translate(-50%,-50%) scale(0.7); opacity: 0.6; }
			100% { transform: translate(-50%,-50%) scale(1.7); opacity: 0; }
		}
	}

	/* ---------- BACK TO TOP (devotional medallion) ---------- */
	.to-top {
		position: fixed;
		left: 24px;
		bottom: 24px;
		z-index: 60;
		width: 56px;
		height: 56px;
		border: none;
		border-radius: 50%;
		cursor: pointer;
		display: flex;
		align-items: center;
		justify-content: center;
		/* ivory medallion with a warm marigold glow */
		background:
			radial-gradient(circle at 50% 38%, var(--ivory) 0 52%, var(--ivory-d) 70%, #e6dcc4 100%);
		color: var(--peacock-d);
		/* layered gold + peacock rings */
		box-shadow:
			0 0 0 1px var(--gold-line),
			0 0 0 4px rgba(255,255,255,0.6),
			0 0 0 5px rgba(217,179,102,0.55),
			0 12px 26px -10px rgba(26,19,53,0.45);
		/* hidden until the user scrolls down */
		opacity: 0;
		visibility: hidden;
		transform: translateY(14px) scale(0.9);
		transition: opacity 0.35s ease, transform 0.35s ease, visibility 0.35s ease;
	}
	.to-top.show {
		opacity: 1;
		visibility: visible;
		transform: translateY(0) scale(1);
	}
	.to-top:hover {
		transform: translateY(-3px) scale(1.04);
		color: var(--indigo);
		box-shadow:
			0 0 0 1px var(--marigold),
			0 0 0 4px rgba(255,255,255,0.7),
			0 0 0 5px rgba(233,162,39,0.7),
			0 18px 34px -10px rgba(26,19,53,0.5);
	}
	.to-top svg { width: 22px; height: 22px; }
	/* slow halo, like a soft aura around the medallion */
	.to-top::before {
		content: "";
		position: absolute;
		inset: -5px;
		border-radius: 50%;
		background: radial-gradient(circle, rgba(233,162,39,0.35), transparent 70%);
		z-index: -1;
		animation: tt-aura 3s ease-out infinite;
	}
	@keyframes tt-aura {
		0%   { transform: scale(0.85); opacity: 0.55; }
		100% { transform: scale(1.5);  opacity: 0; }
	}
	@media (max-width: 560px) {
		.to-top { left: 16px; bottom: 16px; width: 50px; height: 50px; }
		.to-top svg { width: 20px; height: 20px; }
	}

	/* ---------- FOOTER ---------- */
	footer {
		text-align: center;
		margin-top: 60px;
		padding-top: 28px;
		font-family: 'Marcellus', serif;
		color: var(--ink-soft);
		font-size: 14px;

<!-- 1) Load the product list. Editing products.js is all that's needed. -->
<script src="products.js"></script>

<!-- 2) Build the page from that list. (No need to touch this part.) -->
<script>
/* =====================================================================
   Renders the cards, filter buttons, and lightbox from the PRODUCTS
   list defined in products.js. You normally never need to edit this.
   ===================================================================== */

/* Map a Category to the CSS class used for grouping/filtering. */
function categoryClass(cat) {
	var map = { "Calendar": "Calander", "Sticker": "Stickers", "Stand": "Stands", "Misc": "Misc" };
	return map[cat] || String(cat || "").replace(/\s+/g, "");
}
/* Friendly label for the filter button + the small card tag. */
function categoryLabel(cls) {
	var map = { "Calander": "Calendar", "Stickers": "Stickers", "Stands": "Stands", "Misc": "Misc" };
	return map[cls] || cls;
}

var zoomSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4M11 8v6M8 11h6"/></svg>';

function esc(s) {
	return String(s == null ? "" : s)
		.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* "₹ 220" -> styled "Rs 220";  "₹ 70 / piece" -> "Rs 70 / piece" */
function renderPrice(price) {
	var rest = String(price || "").trim().replace(/^(₹|Rs\.?|INR)\s*/i, "").trim();
	var main = rest, qualifier = "";
	var slash = rest.indexOf("/");
	if (slash > -1) { main = rest.slice(0, slash).trim(); qualifier = rest.slice(slash + 1).trim(); }
	var html = '<span class="rs">Rs</span> ' + esc(main);
	if (qualifier) html += ' <span class="rs" style="color:var(--ink-soft)">/ ' + esc(qualifier) + '</span>';
	return html;
}
function plainPrice(price) {
	var rest = String(price || "").trim().replace(/^(₹|Rs\.?|INR)\s*/i, "").trim();
	return rest ? "Rs " + rest : "";
}

function buildCard(p) {
	var cls = categoryClass(p.Category);
	var img = p.IMG_Source || "";
	var title = p.Name || "";

	var col = document.createElement("div");
	col.className = "column " + cls;
	col.setAttribute("data-name", title);
	col.innerHTML =
		'<div class="content">' +
			'<div class="thumb" data-src="' + esc(img) + '" data-title="' + esc(title) + '" data-price="' + esc(plainPrice(p.Price)) + '">' +
				'<img src="' + esc(img) + '" alt="' + esc(title) + '">' +
				'<span class="zoom-badge">' + zoomSVG + '</span>' +
			'</div>' +
			'<div class="card-body">' +
				'<span class="tag">' + esc(categoryLabel(cls)) + '</span>' +
				'<h4>' + esc(title) + '</h4>' +
				'<p class="price">' + renderPrice(p.Price) + '</p>' +
			'</div>' +
		'</div>';
	return col;
}

function buildFilters(categories) {
	var container = document.getElementById("filterBtns");
	container.innerHTML = "";
	function addBtn(value, text, active) {
		var b = document.createElement("button");
		b.className = "btn" + (active ? " active" : "");
		b.textContent = text;
		b.addEventListener("click", function () {
			var cur = container.querySelector(".btn.active");
			if (cur) cur.classList.remove("active");
			b.classList.add("active");
			activeCategory = value;
			applyFilters();
		});
		container.appendChild(b);
	}
	addBtn("all", "All", true);
	categories.forEach(function (cls) { addBtn(cls, categoryLabel(cls)); });
}

/* ---------- Filtering (category + text search combined) ---------- */
var activeCategory = "all";
var searchTerm = "";

function applyFilters() {
	var cols = document.getElementsByClassName("column");
	var cat = activeCategory === "all" ? "" : activeCategory;
	var term = searchTerm.trim().toLowerCase();
	for (var i = 0; i < cols.length; i++) {
		var col = cols[i];
		var matchCat = col.className.indexOf(cat) > -1;
		var name = (col.getAttribute("data-name") || "").toLowerCase();
		var matchText = !term || name.indexOf(term) > -1;
		if (matchCat && matchText) col.classList.add("show");
		else col.classList.remove("show");
	}
	buildVisibleList();

	var note = document.getElementById("loadNote");
	if (term && !document.querySelector(".column.show")) {
		note.textContent = "No products match your search.";
	} else if (note.textContent.indexOf("No products match") === 0) {
		note.textContent = "";
	}
}

/* kept for compatibility — selecting a category */
function filterSelection(c) {
	activeCategory = c;
	applyFilters();
}

/* ---------- Lightbox ---------- */
var lb = document.getElementById("lightbox");
var lbImg = document.getElementById("lbImg");
var lbTitle = document.getElementById("lbTitle");
var lbPrice = document.getElementById("lbPrice");
var visible = [];
var current = 0;

function buildVisibleList() {
	visible = Array.prototype.filter.call(
		document.querySelectorAll(".column .thumb"),
		function (t) {
			return t.closest(".column").classList.contains("show") &&
				!t.classList.contains("no-image") && t.dataset.src;
		}
	);
}
function openLightbox(thumb) {
	buildVisibleList();
	current = visible.indexOf(thumb);
	if (current < 0) return;
	showCurrent();
	lb.classList.add("open");
	document.body.style.overflow = "hidden";
}
function showCurrent() {
	var t = visible[current];
	if (!t) return;
	lbImg.src = t.dataset.src;
	lbImg.alt = t.dataset.title;
	lbTitle.textContent = t.dataset.title;
	lbPrice.textContent = t.dataset.price;
}
function closeLightbox() {
	lb.classList.remove("open");
	document.body.style.overflow = "";
}
function step(d) {
	if (!visible.length) return;
	current = (current + d + visible.length) % visible.length;
	showCurrent();
}
document.getElementById("lbClose").addEventListener("click", closeLightbox);
document.getElementById("lbPrev").addEventListener("click", function () { step(-1); });
document.getElementById("lbNext").addEventListener("click", function () { step(1); });
lb.addEventListener("click", function (e) { if (e.target === lb) closeLightbox(); });
document.addEventListener("keydown", function (e) {
	if (!lb.classList.contains("open")) return;
	if (e.key === "Escape") closeLightbox();
	if (e.key === "ArrowRight") step(1);
	if (e.key === "ArrowLeft") step(-1);
});

/* ---------- Build everything ---------- */
function render(products) {
	var row = document.getElementById("productRow");
	row.innerHTML = "";

	var seen = [];
	products.forEach(function (p) {
		var cls = categoryClass(p.Category);
		if (seen.indexOf(cls) === -1) seen.push(cls);
		row.appendChild(buildCard(p));
	});

	buildFilters(seen);

	/* Missing image -> show the decorative placeholder once (no retry loop). */
	row.querySelectorAll(".thumb img").forEach(function (img) {
		img.addEventListener("error", function () {
			img.setAttribute("data-broken", "1");
			var thumb = img.closest(".thumb");
			if (thumb && !thumb.classList.contains("no-image")) {
				thumb.classList.add("no-image");
				thumb.removeAttribute("data-src");
				var label = document.createElement("span");
				label.className = "img-soon";
				label.textContent = "Image coming soon";
				thumb.appendChild(label);
			}
		});
	});

	/* Click a thumb to open the lightbox (skips placeholder cards). */
	row.querySelectorAll(".thumb").forEach(function (t) {
		t.addEventListener("click", function () {
			if (t.classList.contains("no-image") || !t.dataset.src) return;
			openLightbox(t);
		});
	});

	filterSelection("all");
	document.getElementById("loadNote").textContent = "";
}

(function start() {
	var note = document.getElementById("loadNote");
	if (typeof PRODUCTS === "undefined" || !PRODUCTS || !PRODUCTS.length) {
		note.innerHTML = "No products found. Make sure <b>products.js</b> is in the same folder and starts with <code>var PRODUCTS = [</code>.";
		return;
	}
	render(PRODUCTS);
})();

/* ---------- Back to top ---------- */
(function backToTop() {
	var btn = document.getElementById("toTop");
	if (!btn) return;
	function onScroll() {
		if (window.pageYOffset > 320) btn.classList.add("show");
		else btn.classList.remove("show");
	}
	window.addEventListener("scroll", onScroll, { passive: true });
	onScroll();
	btn.addEventListener("click", function () {
		window.scrollTo({ top: 0, behavior: "smooth" });
	});
})();

/* ---------- Search (expands over the filter bar) ---------- */
(function searchBar() {
	var wrap   = document.getElementById("myBtnContainer");
	var toggle = document.getElementById("searchToggle");
	var box    = document.getElementById("searchBox");
	var input  = document.getElementById("searchInput");
	var clear  = document.getElementById("searchClear");
	var go      = document.getElementById("searchGo");
	if (!wrap || !toggle || !input) return;

	function openSearch() {
		/* freeze the bar's current height so collapsing the buttons can't shrink it */
		wrap.style.height = wrap.offsetHeight + "px";
		wrap.classList.add("searching");
		setTimeout(function () { input.focus(); }, 180);
	}
	function closeSearch() {
		wrap.classList.remove("searching");
		wrap.style.height = "";
		input.value = "";
		searchTerm = "";
		applyFilters();
	}
	function runSearch() {
		searchTerm = input.value;
		applyFilters();
	}

	toggle.addEventListener("click", function (e) { e.stopPropagation(); openSearch(); });
	clear.addEventListener("click", function (e) { e.stopPropagation(); closeSearch(); });
	go.addEventListener("click", function (e) { e.stopPropagation(); runSearch(); });

	/* live filtering as you type */
	input.addEventListener("input", runSearch);
	input.addEventListener("keydown", function (e) {
		if (e.key === "Enter") runSearch();
		if (e.key === "Escape") closeSearch();
	});

	/* click outside the bar collapses it back to buttons */
	document.addEventListener("click", function (e) {
		if (wrap.classList.contains("searching") && !wrap.contains(e.target)) {
			closeSearch();
		}
	});
})();
</script>
